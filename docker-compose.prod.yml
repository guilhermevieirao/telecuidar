services:
  backend:
    # Não expõe porta para fora; acessível via rede Docker pelo Nginx do frontend
    ports: []
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - FrontendUrl=${FRONTEND_URL}

  frontend:
    # Em produção, não expõe porta direta; acesso via Caddy (TLS)
    ports: []
    depends_on:
      - backend

  caddy:
    image: caddy:2
    container_name: telecuidar-caddy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    environment:
      - ACME_AGREE=true
      - EMAIL=${SSL_EMAIL}
    volumes:
      - ./caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
    depends_on:
      - frontend
    networks:
      - telecuidar-network

volumes:
  caddy-data:
  caddy-config:
