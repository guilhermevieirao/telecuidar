services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: telecuidar-backend
    ports:
      - "5058:5058"
    env_file:
      - ./backend/api/.env
    environment:
      - ASPNETCORE_URLS=${ASPNETCORE_URLS:-http://+:5058}
      - ASPNETCORE_ENVIRONMENT=${ASPNETCORE_ENVIRONMENT:-Production}
      - ConnectionStrings__DefaultConnection=${ConnectionStrings__DefaultConnection_Docker:-Data Source=/data/telecuidar.db}
      - FrontendUrl=${FrontendUrl:-http://localhost:4200}
    volumes:
      - db-data:/data
      - ./backend/api/certificado.pfx:/app/certificado.pfx:ro
      - ./backend/api/.env:/app/.env:ro
    restart: unless-stopped
    networks:
      - telecuidar-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: telecuidar-frontend
    ports:
      - "4200:80"
    depends_on:
      - backend
    restart: unless-stopped
    networks:
      - telecuidar-network

  jitsi-prosody:
    image: jitsi/prosody:stable
    container_name: jitsi-prosody
    restart: unless-stopped
    networks:
      telecuidar-network:
        aliases:
          - xmpp.meet.jitsi
    volumes:
      - ./jitsi/config/prosody:/config
      - ./jitsi/config/prosody/prosody-plugins-custom:/prosody-plugins-custom
    env_file:
      - ./backend/api/.env
    environment:
      - XMPP_DOMAIN
      - XMPP_AUTH_DOMAIN
      - XMPP_INTERNAL_MUC_DOMAIN
      - XMPP_MUC_DOMAIN
      - PUBLIC_URL=${PUBLIC_URL:-https://localhost:8443}
      - TZ

  jitsi-web:
    image: jitsi/web:stable
    container_name: jitsi-web
    restart: unless-stopped
    depends_on:
      - jitsi-prosody
      - jitsi-jicofo
      - jitsi-jvb
    networks:
      - telecuidar-network
    ports:
      - "8000:80"
      - "8443:443"
    volumes:
      - ./jitsi/config/web:/config
      - ./jitsi/config/transcripts:/usr/share/jitsi-meet/transcripts
    env_file:
      - ./backend/api/.env
    environment:
      - ENABLE_LETSENCRYPT=0
      - ENABLE_HTTP_REDIRECT=0
      - ENABLE_XMPP_WEBSOCKET
      - ENABLE_STUN
      - DISABLE_3RD_PARTY_REQUESTS
      - PUBLIC_URL=${PUBLIC_URL:-https://localhost:8443}
      - TZ
      - XMPP_SERVER=xmpp.meet.jitsi
      - XMPP_DOMAIN
      - XMPP_BOSH_URL_BASE=http://xmpp.meet.jitsi:5280
      - XMPP_AUTH_DOMAIN
      - XMPP_MUC_DOMAIN
      - XMPP_INTERNAL_MUC_DOMAIN
      - HIDE_PREMEETING_BUTTONS=true
      - ENABLE_PREJOIN_PAGE=true
      - BRAND_WATERMARK_LINK=""
      - DEFAULT_LOGO_URL=""
      - DEFAULT_WELCOME_PAGE_LOGO_URL=""
      - SHOW_JITSI_WATERMARK=false
      - SHOW_WATERMARK_FOR_GUESTS=false

  jitsi-jicofo:
    image: jitsi/jicofo:stable
    container_name: jitsi-jicofo
    restart: unless-stopped
    depends_on:
      - jitsi-prosody
    networks:
      - telecuidar-network
    volumes:
      - ./jitsi/config/jicofo:/config
    env_file:
      - ./backend/api/.env
    environment:
      - XMPP_DOMAIN
      - XMPP_AUTH_DOMAIN
      - XMPP_SERVER=xmpp.meet.jitsi
      - JICOFO_AUTH_USER=focus
      - TZ

  jitsi-jvb:
    image: jitsi/jvb:stable
    container_name: jitsi-jvb
    restart: unless-stopped
    depends_on:
      - jitsi-prosody
    networks:
      - telecuidar-network
    ports:
      - "10000:10000/udp"
    volumes:
      - ./jitsi/config/jvb:/config
    env_file:
      - ./backend/api/.env
    environment:
      - XMPP_SERVER=xmpp.meet.jitsi
      - XMPP_DOMAIN
      - JVB_AUTH_USER=jvb
      - JVB_BREWERY_MUC=jvbbrewery
      - JVB_PORT=10000
      - TZ

volumes:
  db-data:
    driver: local

networks:
  telecuidar-network:
    driver: bridge
