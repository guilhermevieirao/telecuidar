version: '3.8'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: telecuidar-backend
    ports:
      - "5058:5058"
    env_file:
      - ./backend/api/.env
    environment:
      - ASPNETCORE_URLS=${ASPNETCORE_URLS:-http://+:5058}
      - ASPNETCORE_ENVIRONMENT=${ASPNETCORE_ENVIRONMENT:-Production}
      - ConnectionStrings__DefaultConnection=${ConnectionStrings__DefaultConnection_Docker:-Data Source=/data/telecuidar.db}
      - FrontendUrl=${FrontendUrl:-http://localhost:4200}
    volumes:
      - db-data:/data
      - ./backend/api/certificado.pfx:/app/certificado.pfx:ro
    restart: unless-stopped
    networks:
      - telecuidar-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: telecuidar-frontend
    ports:
      - "4200:80"
    depends_on:
      - backend
    restart: unless-stopped
    networks:
      - telecuidar-network

volumes:
  db-data:
    driver: local

networks:
  telecuidar-network:
    driver: bridge
